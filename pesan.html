<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a1b2e">
  <title>Kadonyaa</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/pesan.css">
</head>
<body>

  <!-- Floating particles -->
  <div class="particles" id="particles"></div>

<!-- ── MUSIC PLAYER ── -->
<audio id="bg-audio" preload="none"></audio>
<div id="music-toast" class="music-toast">Klik ▶ buat lagunya</div>
<div id="music-bar">
  <button id="prev-btn" onclick="prevTrack()" title="Lagu sebelumnya" aria-label="Lagu sebelumnya">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="#B5BAFF"><polygon points="19,5 5,12 19,19"/></svg>
  </button>
  <button id="play-btn" onclick="toggleMusic()" title="Play / Pause" aria-label="Play atau Pause musik">
    <svg id="icon-play" width="14" height="14" viewBox="0 0 24 24" fill="#B5BAFF"><polygon points="5,3 19,12 5,21"/></svg>
    <svg id="icon-pause" width="14" height="14" viewBox="0 0 24 24" fill="#B5BAFF" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
  </button>
  <button id="next-btn" onclick="nextTrack()" title="Lagu berikutnya" aria-label="Lagu berikutnya">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="#B5BAFF"><polygon points="5,5 19,12 5,19"/></svg>
  </button>
  <div class="music-info">
    <span class="music-title" id="music-title">Beautiful</span>
    <span class="music-sub" id="music-sub">D.O. (EXO)</span>
  </div>
  <div class="eq-bars paused" id="eq-bars">
    <div class="eq-bar"></div><div class="eq-bar"></div>
    <div class="eq-bar"></div><div class="eq-bar"></div>
  </div>
  <div id="vol-wrap">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#565a8a" stroke-width="2">
      <polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/>
      <path d="M15.54,8.46a5,5,0,0,1,0,7.07"/>
    </svg>
    <input type="range" id="vol-slider" min="0" max="1" step="0.05" value="0.7" aria-label="Volume">
  </div>
</div>

  <!-- ── SITE HEADER ── -->
  <header class="site-header">
    <div class="header-logo-ring"><div class="header-logo-inner">RZB</div></div>
    <h1 class="site-title"><em>Happy Birthday</em><br>Vera Fajriah</h1>
    <p class="site-tag">18 · 06 · 2001</p>
    <span class="site-num-badge" id="unlock-counter">0 / 25 terbuka</span>
  </header>

  <!-- ── CODE INPUT BAR ── -->
  <div class="code-section">
    <p class="code-section__label">Masukkan kode yang aku kasih! Coba tebak!</p>
    <div class="code-box" role="group" aria-label="Input kode 8 digit">
      <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*" placeholder="·" autocomplete="off" aria-label="Digit 1">
      <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*" placeholder="·" autocomplete="off" aria-label="Digit 2">
      <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*" placeholder="·" autocomplete="off" aria-label="Digit 3">
      <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*" placeholder="·" autocomplete="off" aria-label="Digit 4">
      <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*" placeholder="·" autocomplete="off" aria-label="Digit 5">
      <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*" placeholder="·" autocomplete="off" aria-label="Digit 6">
      <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*" placeholder="·" autocomplete="off" aria-label="Digit 7">
      <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*" placeholder="·" autocomplete="off" aria-label="Digit 8">
    </div>
    <p class="code-hint" id="code-hint" role="alert" aria-live="polite"></p>
  </div>

  <!-- ── CARDS GRID ── -->
  <section class="cards-section">
    <p class="section-label">Pesan &amp; Kenangan</p>
    <div class="cards-grid" id="grid"></div>
  </section>

  <!-- ── FOOTER ── -->
  <footer class="site-footer">
    <div class="footer-num">25<sup style="font-size:26px;vertical-align:super;">th</sup></div>
    <p class="footer-txt">With love &amp; all the best wishes</p>
    <a href="index.html" class="back-link">Kedepan Lagi</a>
  </footer>

  <!-- ── MODAL ── -->
  <div class="modal-wrap" id="modal-wrap" onclick="closeModal(event)" role="dialog" aria-modal="true" aria-labelledby="m-from">
    <div class="modal" id="modal-box">
      <div class="modal-img" id="m-img"></div>
      <div class="modal-body">
        <p class="modal-tag"  id="m-tag"></p>
        <p class="modal-from" id="m-from"></p>
        <p class="modal-msg"  id="m-msg"></p>
        <div class="modal-rule"></div>
      </div>
      <button class="modal-close-btn" onclick="closeModal()" aria-label="Tutup pesan">&#x2715;</button>
    </div>
  </div>

  <script src="js/particles.js"></script>
  <script src="js/pesan.js"></script>
</body>
</html>
